name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ============================================================
  # 前端：类型检查 + 52 条单元测试 + 生产构建
  # ============================================================
  frontend:
    name: Frontend — vue-tsc + vitest + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm install

      - name: Type check (vue-tsc --noEmit)
        run: npx vue-tsc --noEmit

      - name: Unit tests (vitest)
        run: npx vitest run --reporter=verbose
        continue-on-error: false

      - name: Production build (vite build)
        run: npm run build

  # ============================================================
  # 后端：JUnit 测试（H2 内存数据库，无需 MySQL）
  # ============================================================
  backend:
    name: Backend — mvn test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: Configure Maven mirrors
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'XML'
          <settings>
            <mirrors>
              <mirror>
                <id>google-maven-central</id>
                <name>Google Maven Central</name>
                <url>https://maven-central.storage-download.googleapis.com/maven2</url>
                <mirrorOf>central</mirrorOf>
              </mirror>
            </mirrors>
          </settings>
          XML

      - name: Run JUnit tests
        run: mvn test -B
        working-directory: ./backend

  # ============================================================
  # Docker 镜像构建（前端 build → 复制到后端 → mvn package → docker build）
  # 依赖 frontend + backend 两个 job 都通过后才执行
  # ============================================================
  docker:
    name: Docker image build
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: Configure Maven mirrors
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'XML'
          <settings>
            <mirrors>
              <mirror>
                <id>google-maven-central</id>
                <name>Google Maven Central</name>
                <url>https://maven-central.storage-download.googleapis.com/maven2</url>
                <mirrorOf>central</mirrorOf>
              </mirror>
            </mirrors>
          </settings>
          XML

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend static
        run: |
          cd frontend
          npm install
          npm run build

      - name: Copy frontend dist → backend static
        run: |
          rm -rf backend/src/main/resources/static/*
          cp -r frontend/dist/* backend/src/main/resources/static/

      - name: Build backend JAR (skip tests — already ran in backend job)
        run: mvn package -DskipTests -B
        working-directory: ./backend

      - name: Build Docker image
        run: docker build -t photo-manager:ci-${{ github.sha }} ./backend

      - name: Verify Docker image
        run: docker images photo-manager
