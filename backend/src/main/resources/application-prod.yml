spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/photodb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate

photo:
  upload-dir: /data/photo-uploads
  watermark:
    font: SansSerif
    font-size-ratio: 40
    color-alpha: 180

cors:
  allowed-origins: http://localhost:*,https://hape233.online

# 生产环境关闭 API 文档
springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false

# 仅暴露 health 端点
management:
  endpoints:
    web:
      exposure:
        include: health
