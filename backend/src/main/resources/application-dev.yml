spring:
  datasource:
    url: jdbc:mysql://localhost:3306/photodb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=utf-8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

admin:
  password: ${ADMIN_PASSWORD:photoadmin}
