server.port=8080

# MySQL 驱动（公共）
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA 平台（公共）
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# 文件上传限制（容器宽松接收，实际校验在应用层）
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# 照片存储目录
photo.upload-dir=${user.home}/photo-uploads

# 水印配置
photo.watermark.font=SansSerif
photo.watermark.font-size-ratio=30
photo.watermark.color-alpha=180


spring.profiles.active=dev

# Spring Cache with Caffeine
spring.cache.type=caffeine
spring.cache.caffeine.spec=expireAfterWrite=30s

# i18n
spring.messages.basename=i18n/messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false