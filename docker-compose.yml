services:
  mysql:
    image: mysql:8.0
    container_name: photodb
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: photodb
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: ./backend
    container_name: photo-manager
    restart: always
    ports:
      - "80:8080"
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: mysql
      DB_USERNAME: root
      DB_PASSWORD: root123
      JWT_SECRET: "请替换为 openssl rand -base64 32 的输出"
      ADMIN_PASSWORD: "photoadmin"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - photo_uploads:/data/photo-uploads
      - photo_logs:/root/logs/photo-manager

volumes:
  mysql_data:
  photo_uploads:
  photo_logs:
